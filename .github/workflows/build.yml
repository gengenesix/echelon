name: Build Echelon — Windows & Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ═══════════════════════════════════════════
  # WINDOWS — .exe installer via NSIS
  # VC++ runtime installed via official redist, NOT bundled in _internal\
  # ═══════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6==6.7.0 opencv-python-headless onnxruntime==1.19.2 insightface Pillow psutil requests tqdm albumentations scikit-learn scipy matplotlib pyvirtualcam onnx pyinstaller

      - name: Prepare data dirs
        shell: cmd
        run: |
          if not exist "data\faces" mkdir data\faces
          if not exist "models\models\buffalo_l" mkdir models\models\buffalo_l

      - name: Download VC++ Redistributable
        shell: powershell
        run: |
          Write-Host "Downloading VC++ 2015-2022 Redistributable..."
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"
          $size = (Get-Item vc_redist.x64.exe).Length
          Write-Host "Downloaded: $([math]::Round($size/1MB, 1)) MB"

      - name: Build with PyInstaller (using spec file)
        shell: cmd
        run: |
          pyinstaller --noconfirm echelon.spec
          if errorlevel 1 exit /b 1

      - name: Verify build output
        shell: powershell
        run: |
          $exePath = "dist\Echelon\Echelon.exe"
          if (!(Test-Path $exePath)) {
            Write-Error "Build failed: Echelon.exe not found"
            exit 1
          }
          $size = (Get-ChildItem "dist\Echelon" -Recurse | Measure-Object -Property Length -Sum).Sum
          Write-Host "Build size: $([math]::Round($size/1MB, 0)) MB"
          Write-Host "Echelon.exe: OK"
          $internalDir = "dist\Echelon\_internal"
          $vcDlls = Get-ChildItem $internalDir -Filter "vcruntime*.dll" -ErrorAction SilentlyContinue
          if ($vcDlls) {
            Write-Warning "VC++ DLLs found in _internal - spec filter may not have worked: $($vcDlls.Name)"
          } else {
            Write-Host "VC++ DLL check: clean (not bundled in _internal)"
          }

      - name: Install NSIS
        shell: cmd
        run: |
          choco install nsis --yes --no-progress
          if not exist "C:\Program Files (x86)\NSIS\makensis.exe" (
            echo NSIS not found after install
            exit /b 1
          )
          echo NSIS installed OK

      - name: Build NSIS installer
        shell: cmd
        run: |
          set PATH=%PATH%;C:\Program Files (x86)\NSIS
          "C:\Program Files (x86)\NSIS\makensis.exe" /V4 installer.nsi
          if errorlevel 1 exit /b 1

      - name: Verify installer
        shell: powershell
        run: |
          $installerPath = "Echelon-Setup.exe"
          if (!(Test-Path $installerPath)) {
            Write-Error "Installer not found"
            exit 1
          }
          $size = (Get-Item $installerPath).Length
          $sizeMB = [math]::Round($size/1MB, 0)
          Write-Host "Installer size: $sizeMB MB - OK"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Echelon-Windows
          path: Echelon-Setup.exe
          retention-days: 90

  # ═══════════════════════════════════════════
  # LINUX — AppImage + .deb
  # ═══════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgl1 libglib2.0-0 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libfreetype6 \
            fuse libfuse2 dpkg-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6==6.7.0 opencv-python-headless onnxruntime insightface Pillow psutil requests tqdm albumentations scikit-learn scipy matplotlib pyvirtualcam onnx pyinstaller

      - name: Prepare data dirs
        run: |
          mkdir -p data/faces
          mkdir -p models/models/buffalo_l

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name=Echelon \
            --onedir \
            --windowed \
            --add-data="assets/styles/theme.qss:assets/styles" \
            --add-data="assets/icons:assets/icons" \
            --add-data="data:data" \
            --hidden-import=PyQt6.QtCore \
            --hidden-import=PyQt6.QtGui \
            --hidden-import=PyQt6.QtWidgets \
            --hidden-import=PyQt6.sip \
            --hidden-import=cv2 \
            --hidden-import=cv2.dnn \
            --hidden-import=numpy \
            --hidden-import=onnxruntime \
            --hidden-import=onnxruntime.capi._pybind_state \
            --hidden-import=onnx \
            --hidden-import=onnx.numpy_helper \
            --hidden-import=insightface \
            --hidden-import=insightface.app \
            --hidden-import=insightface.model_zoo \
            --hidden-import=matplotlib \
            --hidden-import=matplotlib.pyplot \
            --hidden-import=matplotlib.backends.backend_agg \
            --hidden-import=PIL \
            --hidden-import=PIL.Image \
            --hidden-import=psutil \
            --hidden-import=requests \
            --hidden-import=tqdm \
            --hidden-import=sklearn \
            --hidden-import=scipy \
            --hidden-import=scipy.spatial \
            --hidden-import=albumentations \
            --hidden-import=pyvirtualcam \
            --hidden-import=unittest \
            --hidden-import=unittest.mock \
            --hidden-import=numpy.testing \
            --collect-all=insightface \
            --collect-all=onnxruntime \
            --collect-all=albumentations \
            --collect-all=cv2 \
            --exclude-module=onnx.reference \
            --exclude-module=onnxruntime.quantization \
            --exclude-module=onnxruntime.transformers \
            --exclude-module=onnxruntime.training \
            --exclude-module=tkinter \
            --exclude-module=_tkinter \
            --exclude-module=sympy \
            --exclude-module=Cython \
            --noconfirm \
            main.py

      - name: Verify Linux build
        run: |
          if [ ! -f "dist/Echelon/Echelon" ]; then
            echo "ERROR: dist/Echelon/Echelon binary not found!"
            exit 1
          fi
          du -sh dist/Echelon/
          echo "Linux build: OK"

      - name: Build AppImage
        run: |
          chmod +x scripts/build_appimage.sh
          bash scripts/build_appimage.sh

      - name: Build .deb package
        run: |
          chmod +x scripts/build_deb.sh
          bash scripts/build_deb.sh

      - name: Verify outputs
        run: |
          echo "=== Build outputs ==="
          ls -lh Echelon-x86_64.AppImage echelon_2.1.0_amd64.deb
          file Echelon-x86_64.AppImage
          echo "All outputs verified OK"

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: Echelon-Linux
          path: |
            Echelon-x86_64.AppImage
            echelon_2.1.0_amd64.deb
          retention-days: 90

  # ═══════════════════════════════════════════
  # RELEASE — publish to GitHub Releases
  # ═══════════════════════════════════════════
  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Echelon-Windows
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Echelon-Linux
          path: release/

      - name: List release files
        run: ls -lh release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Echelon ${{ github.ref_name }} — by Zero"
          body: |
            ## ⚡ Echelon ${{ github.ref_name }}
            **Real-time face swap for video calls. Created by Zero.**

            ---

            ## 📥 Download & Install

            | Platform | File | How to Install |
            |---|---|---|
            | 🪟 **Windows** | `Echelon-Setup.exe` | Double-click → Next → Finish |
            | 🐧 **Linux (any distro)** | `Echelon-x86_64.AppImage` | `chmod +x Echelon-x86_64.AppImage` then double-click |
            | 🐧 **Ubuntu / Debian** | `echelon_2.1.0_amd64.deb` | `sudo dpkg -i echelon_2.1.0_amd64.deb` |

            ---

            ## 💾 Works Offline & via USB
            All builds are **100% self-contained** — copy to USB, install on any machine without internet.

            *Note: AI models (~850MB) download automatically on first launch (one-time only).*

            ---

            ## ⚙️ Requirements
            - 8GB RAM minimum · Webcam required
            - Linux: run `sudo apt install v4l2loopback-dkms` for virtual camera support
            - Windows: Visual C++ 2015-2022 Runtime is installed automatically by the installer

          files: |
            release/Echelon-Setup.exe
            release/Echelon-x86_64.AppImage
            release/echelon_2.1.0_amd64.deb
          draft: false
          prerelease: false
          fail_on_unmatched_files: false

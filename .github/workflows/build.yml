name: Build Echelon - Windows, Linux & macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ═══════════════════════════════════════════
  # WINDOWS — .exe installer via NSIS
  # Supports Windows 10 and 11 (x64)
  # ═══════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Extract version from tag
        shell: powershell
        run: |
          $ref = "${{ github.ref_name }}"
          $version = $ref -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+') { $version = "3.0.0" }
          echo "VERSION=$version" >> $env:GITHUB_ENV
          Write-Host "Building Echelon v$version for Windows"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6==6.7.0 opencv-python-headless onnxruntime==1.19.2 insightface Pillow psutil requests tqdm albumentations scikit-learn scipy matplotlib pyvirtualcam onnx pyinstaller
          pip install onnxruntime-directml==1.19.2 || echo "DirectML optional, skipping"

      - name: Prepare data dirs
        shell: cmd
        run: |
          if not exist "data\faces" mkdir data\faces
          if not exist "models\models\buffalo_l" mkdir models\models\buffalo_l

      - name: Download VC++ Redistributable
        shell: powershell
        run: |
          Write-Host "Downloading VC++ 2015-2022 Redistributable..."
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"
          Write-Host "Downloaded: $([math]::Round((Get-Item vc_redist.x64.exe).Length/1MB, 1)) MB"

      - name: Build with PyInstaller
        shell: cmd
        run: |
          pyinstaller --noconfirm echelon.spec
          if errorlevel 1 exit /b 1

      - name: Verify build output
        shell: powershell
        run: |
          if (!(Test-Path "dist\Echelon\Echelon.exe")) {
            Write-Error "Build failed: Echelon.exe not found"
            exit 1
          }
          $size = (Get-ChildItem "dist\Echelon" -Recurse | Measure-Object -Property Length -Sum).Sum
          Write-Host "Build size: $([math]::Round($size/1MB, 0)) MB - OK"

      - name: Install NSIS
        shell: powershell
        run: |
          $installed = $false
          # Method 1: winget
          try {
            winget install NSIS.NSIS --silent --accept-package-agreements --accept-source-agreements 2>&1
            if (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe") { $installed = $true; Write-Host "NSIS via winget" }
          } catch {}
          # Method 2: Chocolatey
          if (-not $installed) {
            try {
              choco install nsis --yes --no-progress 2>&1
              if (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe") { $installed = $true; Write-Host "NSIS via choco" }
            } catch {}
          }
          # Method 3: Direct download (fallback)
          if (-not $installed) {
            foreach ($url in @(
              "https://downloads.sourceforge.net/project/nsis/NSIS%203/3.10/nsis-3.10-setup.exe",
              "https://prdownloads.sourceforge.net/nsis/nsis-3.09-setup.exe"
            )) {
              try {
                $out = "$env:TEMP\nsis.exe"
                Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing -TimeoutSec 90
                if ((Get-Item $out).Length -gt 1MB) {
                  Start-Process $out -ArgumentList "/S" -Wait -ErrorAction Stop
                  if (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe") { $installed = $true; break }
                }
              } catch {}
            }
          }
          if (-not $installed) { Write-Error "NSIS install failed"; exit 1 }
          Write-Host "NSIS ready"

      - name: Build NSIS installer
        shell: cmd
        run: |
          set PATH=%PATH%;C:\Program Files (x86)\NSIS
          "C:\Program Files (x86)\NSIS\makensis.exe" /V4 /DAPP_VERSION=${{ env.VERSION }} installer.nsi
          if errorlevel 1 exit /b 1

      - name: Verify installer
        shell: powershell
        run: |
          if (!(Test-Path "Echelon-Setup.exe")) { Write-Error "Installer missing"; exit 1 }
          Write-Host "Installer: $([math]::Round((Get-Item Echelon-Setup.exe).Length/1MB,0)) MB - OK"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Echelon-Windows
          path: Echelon-Setup.exe
          retention-days: 90


  # ═══════════════════════════════════════════
  # LINUX — AppImage (universal) + .deb (Ubuntu/Debian)
  # Supports Ubuntu 20.04+, Debian 11+, and any distro via AppImage
  # ═══════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            VERSION="3.0.0"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building Echelon v$VERSION for Linux"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgl1 libglib2.0-0 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libfreetype6 \
            fuse libfuse2 dpkg-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6==6.7.0 opencv-python-headless onnxruntime insightface Pillow psutil requests tqdm albumentations scikit-learn scipy matplotlib pyvirtualcam onnx pyinstaller

      - name: Prepare data dirs
        run: mkdir -p data/faces models/models/buffalo_l

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name=Echelon --onedir --windowed \
            --add-data="assets/styles/theme.qss:assets/styles" \
            --add-data="assets/icons:assets/icons" \
            --add-data="data:data" \
            --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui \
            --hidden-import=PyQt6.QtWidgets --hidden-import=PyQt6.sip \
            --hidden-import=cv2 --hidden-import=numpy \
            --hidden-import=onnxruntime --hidden-import=onnxruntime.capi._pybind_state \
            --hidden-import=onnx --hidden-import=onnx.numpy_helper \
            --hidden-import=insightface --hidden-import=insightface.app \
            --hidden-import=insightface.model_zoo \
            --hidden-import=matplotlib --hidden-import=matplotlib.backends.backend_agg \
            --hidden-import=PIL --hidden-import=psutil --hidden-import=requests \
            --hidden-import=sklearn --hidden-import=scipy --hidden-import=albumentations \
            --hidden-import=pyvirtualcam \
            --collect-all=insightface --collect-all=onnxruntime \
            --collect-all=albumentations --collect-all=cv2 \
            --exclude-module=tkinter --exclude-module=sympy \
            --noconfirm main.py

      - name: Verify Linux build
        run: |
          [ -f "dist/Echelon/Echelon" ] || { echo "ERROR: binary missing"; exit 1; }
          du -sh dist/Echelon/ && echo "Linux PyInstaller build: OK"

      - name: Build AppImage
        run: |
          chmod +x scripts/build_appimage.sh
          bash scripts/build_appimage.sh

      - name: Verify AppImage
        run: |
          [ -f "Echelon-x86_64.AppImage" ] || { echo "ERROR: AppImage missing"; exit 1; }
          echo "AppImage: $(du -sh Echelon-x86_64.AppImage | cut -f1) - OK"

      - name: Build .deb package
        run: |
          chmod +x scripts/build_deb.sh
          ECHELON_VERSION=${{ env.VERSION }} bash scripts/build_deb.sh

      - name: Verify .deb package
        run: |
          [ -f "echelon_${{ env.VERSION }}_amd64.deb" ] || { echo "ERROR: .deb missing"; ls -la *.deb 2>/dev/null || echo "No .deb found"; exit 1; }
          echo "Deb: $(du -sh echelon_${{ env.VERSION }}_amd64.deb | cut -f1) - OK"

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Echelon-Linux
          path: |
            Echelon-x86_64.AppImage
            echelon_${{ env.VERSION }}_amd64.deb
          retention-days: 90


  # ═══════════════════════════════════════════
  # macOS — Universal Binary (Apple Silicon + Intel via Rosetta 2)
  # Supports macOS 10.15 Catalina and later
  # Note: A true fat binary (native on both) requires two concurrent macOS
  # runners which hits the free-tier limit. The single arm64 build runs
  # natively on M1/M2/M3/M4 and transparently via Rosetta 2 on Intel Macs.
  # ═══════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6==6.7.0 opencv-python-headless onnxruntime insightface \
            Pillow psutil requests tqdm albumentations scikit-learn scipy \
            matplotlib onnx pyinstaller

      - name: Prepare data dirs
        run: mkdir -p data/faces models/models/buffalo_l

      - name: Build macOS app
        run: |
          pyinstaller \
            --name=Echelon --onedir --windowed \
            --add-data="assets/styles/theme.qss:assets/styles" \
            --add-data="assets/icons:assets/icons" \
            --add-data="data:data" \
            --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui \
            --hidden-import=PyQt6.QtWidgets --hidden-import=PyQt6.sip \
            --hidden-import=cv2 --hidden-import=numpy \
            --hidden-import=onnxruntime --hidden-import=onnxruntime.capi._pybind_state \
            --hidden-import=onnx --hidden-import=onnx.numpy_helper \
            --hidden-import=insightface --hidden-import=insightface.app \
            --hidden-import=insightface.model_zoo \
            --hidden-import=matplotlib --hidden-import=matplotlib.backends.backend_agg \
            --hidden-import=PIL --hidden-import=psutil --hidden-import=requests \
            --hidden-import=sklearn --hidden-import=scipy --hidden-import=albumentations \
            --collect-all=insightface --collect-all=onnxruntime \
            --collect-all=albumentations --collect-all=cv2 \
            --exclude-module=tkinter --exclude-module=sympy --exclude-module=pyvirtualcam \
            --osx-bundle-identifier=com.zero.echelon \
            --noconfirm main.py

      - name: Verify macOS build
        run: |
          [ -d "dist/Echelon.app" ] || { echo "ERROR: Echelon.app not found"; ls dist/; exit 1; }
          file dist/Echelon.app/Contents/MacOS/Echelon
          du -sh dist/Echelon.app/
          echo "macOS build: OK"

      - name: Fix Info.plist and permissions
        run: |
          APP="dist/Echelon.app"
          PLIST="$APP/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion 10.15" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :LSMinimumSystemVersion string 10.15" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.zero.echelon" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.ref_name }}" "$PLIST" 2>/dev/null || true
            plutil -lint "$PLIST" && echo "Info.plist: valid" || echo "Info.plist: warning (non-fatal)"
          fi
          chmod +x "$APP/Contents/MacOS/Echelon"
          xattr -cr "$APP" 2>/dev/null || true

      - name: Package as DMG
        run: |
          mkdir -p dmg_staging
          cp -r dist/Echelon.app dmg_staging/Echelon.app
          ln -sf /Applications dmg_staging/Applications
          hdiutil create \
            -volname "Echelon" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            Echelon-macOS.dmg
          [ -f "Echelon-macOS.dmg" ] || { echo "ERROR: DMG not created"; exit 1; }
          echo "DMG: $(du -sh Echelon-macOS.dmg | cut -f1) - OK"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Echelon-macOS
          path: Echelon-macOS.dmg
          retention-days: 90


  # ═══════════════════════════════════════════
  # RELEASE — publish to GitHub Releases
  # Runs even if one platform build fails (always())
  # so a partial release is still published
  # ═══════════════════════════════════════════
  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && always()
    permissions:
      contents: write
    steps:
      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download Windows artifact
        uses: actions/download-artifact@v4.3.0
        continue-on-error: true
        with:
          name: Echelon-Windows
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4.3.0
        continue-on-error: true
        with:
          name: Echelon-Linux
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4.3.0
        continue-on-error: true
        with:
          name: Echelon-macOS
          path: release/

      - name: List release files
        run: ls -lh release/ || echo "No release files found"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          name: "Echelon ${{ github.ref_name }} — by Zero"
          body: |
            ## ⚡ Echelon ${{ github.ref_name }}
            **Real-time face swap for video calls. Created by Zero.**

            ---

            ## 📥 Download & Install

            | Platform | File | Notes |
            |---|---|---|
            | 🪟 **Windows 10 / 11** | `Echelon-Setup.exe` | Double-click → Next → Finish |
            | 🍎 **macOS 10.15+** | `Echelon-macOS.dmg` | Apple Silicon native, Intel via Rosetta 2 |
            | 🐧 **Linux (any distro)** | `Echelon-x86_64.AppImage` | `chmod +x` then double-click |
            | 🐧 **Ubuntu / Debian** | `echelon_${{ env.VERSION }}_amd64.deb` | `sudo dpkg -i echelon_${{ env.VERSION }}_amd64.deb` |

            ---

            ## 🪟 Windows — SmartScreen warning

            Windows may show "Unknown publisher" on first run. Click **More info → Run anyway**.
            This is normal for apps without a code-signing certificate.

            ---

            ## 🍎 macOS — First Launch Fix

            macOS Gatekeeper blocks unsigned apps. **One-time fix:**

            ```bash
            xattr -rd com.apple.quarantine /Applications/Echelon.app
            ```

            Or: right-click `Echelon.app` → **Open** → **Open**. Done.

            ---

            ## 🎥 Virtual Camera Setup (required for video calls)

            | Platform | Instructions |
            |---|---|
            | 🪟 Windows | Install [OBS Studio](https://obsproject.com/) → Start OBS → click **Start Virtual Camera** |
            | 🍎 macOS | Install [OBS Studio](https://obsproject.com/) → Start OBS → click **Start Virtual Camera** |
            | 🐧 Linux | Echelon loads v4l2loopback automatically. If needed: `sudo apt install v4l2loopback-dkms` |

            Then in Zoom / Meet / Discord → select **"Echelon Camera"** as your camera.

            ---

            ## 🤖 AI Models (first launch only)

            On first launch, Echelon downloads two models (~600 MB, one-time):

            | Model | Size | Purpose |
            |---|---|---|
            | `inswapper_128.onnx` | ~554 MB | Face swap engine |
            | `buffalo_l` | ~46 MB | Face detection |

            Downloads automatically via the setup wizard.

            ---

            ## ⚙️ System Requirements

            | | Minimum | Recommended |
            |---|---|---|
            | RAM | 8 GB | 16 GB |
            | CPU | Intel i5 (8th gen+) / AMD Ryzen 5 | Intel i7 / Ryzen 7 |
            | GPU | Not required | NVIDIA CUDA (major FPS boost) |
            | OS | Windows 10+ / macOS 10.15+ / Ubuntu 20.04+ | Latest |
            | Webcam | Required | 1080p HD |

          files: |
            release/Echelon-Setup.exe
            release/Echelon-macOS.dmg
            release/Echelon-x86_64.AppImage
            release/echelon_*_amd64.deb
          draft: false
          prerelease: false
          fail_on_unmatched_files: false

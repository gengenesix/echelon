name: Build Echelon — Windows & Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ═══════════════════════════════════════════
  # WINDOWS — .exe installer via NSIS
  # ═══════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6==6.7.0 opencv-python-headless onnxruntime insightface Pillow psutil requests tqdm albumentations scikit-learn scipy matplotlib pyinstaller

      - name: Prepare data dirs
        shell: cmd
        run: |
          if not exist "data\faces" mkdir data\faces
          if not exist "models\models\buffalo_l" mkdir models\models\buffalo_l

      - name: Build with PyInstaller
        shell: cmd
        run: >
          pyinstaller
          --name=Echelon
          --onedir
          --windowed
          --icon=assets\icons\echelon.ico
          --add-data="assets\styles\theme.qss;assets\styles"
          --add-data="assets\icons;assets\icons"
          --add-data="data;data"
          --hidden-import=PyQt6.QtCore
          --hidden-import=PyQt6.QtGui
          --hidden-import=PyQt6.QtWidgets
          --hidden-import=PyQt6.sip
          --hidden-import=cv2
          --hidden-import=numpy
          --hidden-import=onnxruntime
          --hidden-import=onnxruntime.capi._pybind_state
          --hidden-import=insightface
          --hidden-import=insightface.app
          --hidden-import=insightface.model_zoo
          --hidden-import=matplotlib
          --hidden-import=matplotlib.pyplot
          --hidden-import=matplotlib.backends.backend_agg
          --hidden-import=PIL
          --hidden-import=PIL.Image
          --hidden-import=psutil
          --hidden-import=requests
          --hidden-import=tqdm
          --hidden-import=sklearn
          --hidden-import=scipy
          --hidden-import=scipy.spatial
          --hidden-import=albumentations
          --hidden-import=unittest
          --hidden-import=unittest.mock
          --hidden-import=numpy.testing
          --collect-all=insightface
          --collect-submodules=onnxruntime.capi
          --exclude-module=onnx.reference
          --exclude-module=onnxruntime.quantization
          --exclude-module=onnxruntime.transformers
          --exclude-module=onnxruntime.training
          --exclude-module=sympy
          --exclude-module=Cython
          --noconfirm
          main.py

      - name: Install NSIS
        shell: cmd
        run: choco install nsis --yes --no-progress

      - name: Build NSIS installer
        shell: cmd
        run: |
          set PATH=%PATH%;C:\Program Files (x86)\NSIS
          makensis installer.nsi

      - name: Verify installer
        shell: cmd
        run: dir Echelon-Setup.exe

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Echelon-Windows
          path: Echelon-Setup.exe
          retention-days: 90

  # ═══════════════════════════════════════════
  # LINUX — AppImage + .deb
  # ═══════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgl1 libglib2.0-0 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libfreetype6 \
            fuse libfuse2 dpkg-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6==6.7.0 opencv-python-headless onnxruntime insightface Pillow psutil requests tqdm albumentations scikit-learn scipy matplotlib pyvirtualcam pyinstaller

      - name: Prepare data dirs
        run: |
          mkdir -p data/faces
          mkdir -p models/models/buffalo_l

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name=Echelon \
            --onedir \
            --windowed \
            --add-data="assets/styles/theme.qss:assets/styles" \
            --add-data="assets/icons:assets/icons" \
            --add-data="data:data" \
            --hidden-import=PyQt6.QtCore \
            --hidden-import=PyQt6.QtGui \
            --hidden-import=PyQt6.QtWidgets \
            --hidden-import=PyQt6.sip \
            --hidden-import=cv2 \
            --hidden-import=numpy \
            --hidden-import=onnxruntime \
            --hidden-import=onnxruntime.capi._pybind_state \
            --hidden-import=insightface \
            --hidden-import=insightface.app \
            --hidden-import=insightface.model_zoo \
            --hidden-import=matplotlib \
            --hidden-import=matplotlib.pyplot \
            --hidden-import=matplotlib.backends.backend_agg \
            --hidden-import=PIL \
            --hidden-import=PIL.Image \
            --hidden-import=psutil \
            --hidden-import=requests \
            --hidden-import=tqdm \
            --hidden-import=sklearn \
            --hidden-import=scipy \
            --hidden-import=scipy.spatial \
            --hidden-import=albumentations \
            --hidden-import=unittest \
            --hidden-import=unittest.mock \
            --hidden-import=numpy.testing \
            --collect-all=insightface \
            --collect-all=onnxruntime \
            --noconfirm \
            main.py

      - name: Build AppImage
        run: |
          chmod +x scripts/build_appimage.sh
          bash scripts/build_appimage.sh

      - name: Build .deb package
        run: |
          chmod +x scripts/build_deb.sh
          bash scripts/build_deb.sh

      - name: Verify outputs
        run: |
          echo "=== Build outputs ==="
          ls -lh Echelon-x86_64.AppImage echelon_2.0.0_amd64.deb
          file Echelon-x86_64.AppImage

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: Echelon-Linux
          path: |
            Echelon-x86_64.AppImage
            echelon_2.0.0_amd64.deb
          retention-days: 90

  # ═══════════════════════════════════════════
  # RELEASE — publish to GitHub Releases
  # ═══════════════════════════════════════════
  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Echelon-Windows
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Echelon-Linux
          path: release/

      - name: List release files
        run: ls -lh release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Echelon ${{ github.ref_name }} — by Zero"
          body: |
            ## ⚡ Echelon ${{ github.ref_name }}
            **Real-time face swap for video calls. Created by Zero.**

            ---

            ## 📥 Download & Install

            | Platform | File | How to Install |
            |---|---|---|
            | 🪟 **Windows** | `Echelon-Setup.exe` | Double-click → Next → Finish |
            | 🐧 **Linux (any distro)** | `Echelon-x86_64.AppImage` | `chmod +x Echelon-x86_64.AppImage` then double-click |
            | 🐧 **Ubuntu / Debian** | `echelon_2.0.0_amd64.deb` | `sudo dpkg -i echelon_2.0.0_amd64.deb` |

            ---

            ## 💾 Works Offline & via USB
            All builds are **100% self-contained** — copy to USB, install on any machine without internet.

            *Note: AI models (~850MB) download automatically on first launch (one-time only).*

            ---

            ## ⚙️ Requirements
            - 8GB RAM minimum · Webcam required
            - Linux: run `sudo apt install v4l2loopback-dkms` for virtual camera support

          files: |
            release/Echelon-Setup.exe
            release/Echelon-x86_64.AppImage
            release/echelon_2.0.0_amd64.deb
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
